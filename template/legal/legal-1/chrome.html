<!-- HEADER -->
<!-- Mobile Header -->
<header class="mobile-header">
  <a href="#" class="brand">
    <div class="globe-icon"><i class="fas fa-globe"></i></div>
    <span class="brand-name">{{title}}</span>
  </a>
  <button class="hamburger" id="hamburgerBtn" aria-label="Toggle navigation">
    <span></span>
    <span></span>
    <span></span>
  </button>
</header>

<!-- Mobile Nav Overlay -->
<div class="mobile-nav-overlay" id="navOverlay"></div>

<!-- Sidebar Navigation -->
<aside class="sidebar" id="sidebar">
  <div class="brand-section">
    <a href="#" class="brand-link">
      <div class="globe-icon"><i class="fas fa-globe"></i></div>
      <span class="brand-name">{{title}}</span>
    </a>
    <nav>{{nav}}</nav>
  </div>
  <div class="status-section">
    <div class="status-indicator">
      <div class="status-dot"></div>
      <span class="status-label">All Systems Operational</span>
    </div>
    <div class="status-indicator">
      <div class="status-dot"></div>
      <span class="status-label">API v4.2 Active</span>
    </div>
  </div>
</aside>

<!-- Main Content -->

<main class="content">{{content}}</main>

<!-- FOOTER -->
<footer class="footer">
    <div class="footer-brand">
      <span class="footer-brand-name">{{title}}</span>
      <span class="footer-copyright">© 2024 {{title}} Systems, Inc. All rights reserved.</span>
    </div>
    <div class="footer-links">
    {{nav}}
  </div>
  </footer>
