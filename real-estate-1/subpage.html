<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>

{{tokens}}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 14px;
  line-height: 1.5;
}

body {
  font-family: var(--font-mono);
  background-color: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-wrap: break-word;
  word-break: break-word;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  height: 50px;
  background-color: var(--bg-primary);
  border-bottom: 1px solid var(--border-color);
  display: grid;
  grid-template-columns: 1fr;
  align-items: center;
  flex-shrink: 0;
}

.header-breadcrumb,
.header-status,
.header-clock {
  padding: 0 var(--spacing-sm);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  height: 100%;
  display: flex;
  align-items: center;
}

.header-status,
.header-clock {
  display: none;
}

@media (min-width: 768px) {
  .header {
    grid-template-columns: 2fr 1fr 1fr;
  }

  .header-status,
  .header-clock {
    display: flex;
    border-left: 1px solid var(--border-color);
  }

  .header-status {
    justify-content: center;
  }

  .header-clock {
    justify-content: flex-end;
  }
}

/* Main */
.main-content {
  flex: 1;
  padding-bottom: 40px;
}

/* Folder Accordion */
.folder {
  border-bottom: 1px solid var(--border-color);
}

.folder-header {
  height: 60px;
  display: grid;
  grid-template-columns: 60px 1fr 60px;
  align-items: center;
  cursor: pointer;
  transition: background-color 0.2s ease;
  user-select: none;
}

.folder-header:hover {
  background-color: var(--hover-bg);
}

.folder-index {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid var(--border-color);
  font-size: 14px;
  font-weight: 700;
}

.folder-title {
  padding: 0 var(--spacing-md);
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.folder-chevron {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  border-left: 1px solid var(--border-color);
}

.chevron-arrow {
  width: 10px;
  height: 10px;
  border-right: 2px solid var(--border-color);
  border-bottom: 2px solid var(--border-color);
  transform: rotate(45deg);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  top: -2px;
}

.folder.active .chevron-arrow {
  transform: rotate(-135deg);
  top: 2px;
}

.folder-content {
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
}

.folder.active .folder-content {
  max-height: 3000px;
  opacity: 1;
}

.folder-inner {
  border-top: 1px solid var(--border-color);
  padding: var(--spacing-md);
}

@media (min-width: 768px) {
  .folder-inner {
    padding: var(--spacing-lg);
  }
}

/* Folder 1: Manifest / Profile */
.profile-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--spacing-md);
}

@media (min-width: 768px) {
  .profile-grid {
    grid-template-columns: 1fr 1fr;
    gap: var(--spacing-lg);
  }
}

.profile-bio p {
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: var(--spacing-md);
  color: var(--text-primary);
}

.profile-bio p:last-child {
  margin-bottom: 0;
}

.profile-meta {
  border: 1px solid var(--border-color);
}

.meta-row {
  display: grid;
  grid-template-columns: 120px 1fr;
  border-bottom: 1px solid var(--border-color);
  font-size: 12px;
}

.meta-row:last-child {
  border-bottom: none;
}

.meta-label {
  padding: var(--spacing-xs) var(--spacing-sm);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
  border-right: 1px solid var(--border-color);
  font-size: 11px;
  display: flex;
  align-items: center;
}

.meta-value {
  padding: var(--spacing-xs) var(--spacing-sm);
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
}

/* Folder 2: Inventory / Works */
.works-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--spacing-sm);
}

@media (min-width: 600px) {
  .works-grid {
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  }
}

.work-card {
  border: 1px solid var(--border-color);
}

.work-card-image {
  aspect-ratio: 1 / 1;
  background-color: var(--bg-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid var(--border-color);
  position: relative;
  overflow: hidden;
}

.shape-rect {
  width: 80px;
  height: 80px;
  background-color: var(--text-primary);
}

.shape-circle {
  width: 80px;
  height: 80px;
  background-color: var(--text-primary);
  border-radius: 50%;
}

.shape-triangle {
  width: 0;
  height: 0;
  border-left: 45px solid transparent;
  border-right: 45px solid transparent;
  border-bottom: 80px solid var(--text-primary);
}

.shape-cross {
  width: 90px;
  height: 90px;
  position: relative;
}

.shape-cross::before,
.shape-cross::after {
  content: '';
  position: absolute;
  background-color: var(--text-primary);
  top: 50%;
  left: 50%;
}

.shape-cross::before {
  width: 127px;
  height: 2px;
  transform: translate(-50%, -50%) rotate(45deg);
}

.shape-cross::after {
  width: 127px;
  height: 2px;
  transform: translate(-50%, -50%) rotate(-45deg);
}

.work-card-info {
  padding: var(--spacing-sm);
}

.work-card-title {
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: var(--spacing-xs);
}

.work-card-desc {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
  margin-bottom: var(--spacing-sm);
}

.work-card-year {
  display: inline-block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  border: 1px solid var(--border-color);
  padding: 2px 8px;
}

/* Folder 3: Transmission / Contact */
.contact-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--spacing-md);
}

@media (min-width: 768px) {
  .contact-grid {
    grid-template-columns: 1fr 1fr;
    gap: var(--spacing-lg);
  }
}

.form-group {
  margin-bottom: var(--spacing-sm);
}

.form-label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 700;
  margin-bottom: 6px;
}

.form-input,
.form-textarea {
  width: 100%;
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 10px var(--spacing-sm);
  background-color: transparent;
  border: 1px solid var(--border-color);
  border-radius: 0;
  color: var(--text-primary);
  outline: none;
  transition: background-color 0.2s ease;
  -webkit-appearance: none;
}

.form-input:focus,
.form-textarea:focus {
  background-color: var(--focus-bg);
}

.form-textarea {
  resize: vertical;
  min-height: 120px;
  line-height: 1.5;
}

.form-button {
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 700;
  padding: 12px var(--spacing-md);
  background-color: var(--btn-bg);
  color: var(--btn-text);
  border: 1px solid var(--border-color);
  border-radius: 0;
  cursor: pointer;
  transition: opacity 0.2s ease;
  width: 100%;
}

@media (min-width: 768px) {
  .form-button {
    width: auto;
  }
}

.form-button:hover {
  opacity: 0.8;
}

.social-links {
  border: 1px solid var(--border-color);
  align-self: start;
}

.social-link {
  display: block;
  padding: 12px var(--spacing-sm);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  text-decoration: none;
  color: var(--text-primary);
  border-bottom: 1px solid var(--border-color);
  transition: background-color 0.2s ease;
}

.social-link:last-child {
  border-bottom: none;
}

.social-link:hover {
  background-color: var(--hover-bg);
}

.social-link-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.social-link-arrow {
  font-size: 14px;
}

/* Footer */
.footer {
  height: 40px;
  border-top: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--spacing-sm);
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
  background-color: var(--bg-primary);
}

.footer-version,
.footer-copyright {
  text-transform: uppercase;
  letter-spacing: 1px;
}


  .page-title-area { padding: 120px 24px 60px; text-align: center; }
  .page-title-area h1 { font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 8px; }
  .content-area { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; line-height: 1.8; }
  .content-area h2 { margin-top: 2em; margin-bottom: 0.5em; }
  .content-area p { margin-bottom: 1em; }
  .content-area img { max-width: 100%; height: auto; border-radius: 8px; margin: 1.5em 0; }
  .content-area ul, .content-area ol { margin-bottom: 1em; padding-left: 1.5em; }
</style>
</head>
<body>

{{chrome_header}}

<section class="page-title-area">
  <h1>{{title}}</h1>
</section>

<div class="content-area">
  {{content}}
</div>

{{chrome_footer}}

<script>

function toggleFolder(index) {
  var folders = document.querySelectorAll('.folder');
  folders.forEach(function(folder) {
    var folderIndex = parseInt(folder.getAttribute('data-folder'));
    if (folderIndex === index) {
      folder.classList.toggle('active');
    } else {
      folder.classList.remove('active');
    }
  });
}

function updateClock() {
  var now = new Date();
  var hours = String(now.getUTCHours()).padStart(2, '0');
  var minutes = String(now.getUTCMinutes()).padStart(2, '0');
  var seconds = String(now.getUTCSeconds()).padStart(2, '0');
  document.getElementById('utcClock').textContent = 'UTC ' + hours + ':' + minutes + ':' + seconds;
}

updateClock();
setInterval(updateClock, 1000);

</script>
</body>
</html>
