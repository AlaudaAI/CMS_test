<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
<style>
  {{tokens}}

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: var(--font-sans);
    background-color: var(--bg);
    color: var(--fg);
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    overflow-wrap: break-word;
  }

  /* Navigation */
  .mobile-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--spacing-md) var(--spacing-lg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
}

  .mobile-header .brand {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
  text-decoration: none;
  color: var(--fg);
}

  .mobile-header .brand .globe-icon {
  width: 32px;
  height: 32px;
  border: 1.5px solid var(--fg);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

  .mobile-header .brand-name {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

  .hamburger {
  display: flex;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  padding: var(--spacing-sm);
}

  .hamburger span {
  display: block;
  width: 22px;
  height: 1.5px;
  background: var(--fg);
  transition: all 0.3s ease;
}

  .sidebar {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: var(--sidebar-width);
  height: 100vh;
  background: var(--bg);
  border-right: 1px solid var(--border);
  z-index: 200;
  flex-direction: column;
  justify-content: space-between;
  padding: var(--spacing-xl) var(--spacing-lg);
  overflow-y: auto;
}

  .sidebar .brand-section {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-xl);
}

  .sidebar .brand-link {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  color: var(--fg);
}

  .sidebar .globe-icon {
  width: 38px;
  height: 38px;
  border: 1.5px solid var(--fg);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

  .sidebar .brand-name {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

  .sidebar nav {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-lg);
}

  .sidebar nav a {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.3s ease;
}

  .sidebar nav a:hover {
  color: var(--fg);
}

  .sidebar .status-section {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md);
}

  .mobile-nav-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 150;
}

  .mobile-nav-overlay.active {
  display: block;
}

  .sidebar.active {
  display: flex;
}

  .sidebar {
    display: flex !important;
  }

  .mobile-nav-overlay {
    display: none !important;
  }

  /* Page Title Area */
  .page-title-area {
    padding: calc(96px + 60px) var(--spacing-lg) var(--spacing-3xl);
    background: var(--fg);
    color: #ffffff;
  }

  .page-title-inner {
    max-width: 1200px;
    margin: 0 auto;
  }

  .page-title-area h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.03em;
  }

  /* Content Area */
  .content-area {
    padding: var(--spacing-3xl) var(--spacing-lg);
    max-width: 1200px;
    margin: 0 auto;
  }

  .content-area h2 {
    font-size: clamp(1.5rem, 3vw, 2rem);
    font-weight: 600;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--fg);
    margin-bottom: var(--spacing-lg);
  }

  .content-area h3 {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--fg);
    margin-bottom: var(--spacing-md);
  }

  .content-area p {
    font-size: 1rem;
    line-height: 1.7;
    color: var(--muted);
    margin-bottom: var(--spacing-lg);
  }

  .content-area ul, .content-area ol {
    margin-bottom: var(--spacing-lg);
    padding-left: var(--spacing-lg);
    color: var(--muted);
  }

  .content-area li {
    margin-bottom: 8px;
    line-height: 1.7;
  }

  .content-area img {
    max-width: 100%;
    height: auto;
    border-radius: 12px;
    margin-bottom: var(--spacing-lg);
  }

  .content-area a {
    color: var(--fg);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-thickness: 1px;
    font-weight: 500;
  }

  .content-area a:hover {
    text-decoration-thickness: 2px;
  }

  /* Footer */
  .footer {
  padding: var(--spacing-xl) var(--spacing-lg);
  display: flex;
  flex-direction: column;
  gap: var(--spacing-lg);
}

  .footer-brand {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-sm);
}

  .footer-brand-name {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--fg);
}

  .footer-copyright {
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 300;
  color: var(--text-dim);
}

  .footer-links {
  display: flex;
  flex-wrap: wrap;
  gap: var(--spacing-md) var(--spacing-lg);
}

  .footer-links a {
  font-family: var(--font-sans);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.3s ease;
}

  .footer-links a:hover {
  color: var(--fg);
}

  .footer {
    flex-direction: row;
    justify-content: space-between;
    align-items: flex-end;
  }

  .footer {
    padding: var(--spacing-xl) var(--spacing-2xl);
  }

  /* Responsive */
  @media (min-width: 768px) {
  .hero {
    flex-direction: row;
    align-items: center;
    padding: var(--spacing-2xl) var(--spacing-xl);
  }

  .hero-text {
    flex: 1.2;
  }

  .hero-visual {
    flex: 0.8;
    max-width: 320px;
  }

  .hero-headline {
    font-size: clamp(42px, 5vw, 56px);
  }

  .features {
    grid-template-columns: 1fr 1fr 1fr;
  }

  .feature-card {
    border-bottom: none;
    border-right: 1px solid var(--border);
  }

  .feature-card:last-child {
    border-right: none;
  }

  .trust-section {
    grid-template-columns: 1fr 1fr;
  }

  .trust-metrics {
    border-bottom: none;
    border-right: 1px solid var(--border);
  }

  .footer {
    flex-direction: row;
    justify-content: space-between;
    align-items: flex-end;
  }
}

  @media (min-width: 1024px) {
  .mobile-header {
    display: none;
  }

  .sidebar {
    display: flex !important;
  }

  .mobile-nav-overlay {
    display: none !important;
  }

  .main-content {
    margin-left: var(--sidebar-width);
    width: calc(100% - var(--sidebar-width));
  }

  .hero {
    padding: var(--spacing-3xl) var(--spacing-2xl);
    gap: var(--spacing-2xl);
    min-height: 80vh;
  }

  .hero-headline {
    font-size: clamp(56px, 5vw, 76px);
  }

  .hero-subheading {
    font-size: 20px;
  }

  .hero-visual {
    max-width: 380px;
  }

  .features {
    /* already 3-col from tablet */
  }

  .feature-card {
    padding: var(--spacing-2xl) var(--spacing-xl);
  }

  .trust-section {
    /* already 2-col from tablet */
  }

  .trust-metrics {
    padding: var(--spacing-3xl) var(--spacing-2xl);
  }

  .trust-clients {
    padding: var(--spacing-3xl) var(--spacing-2xl);
  }

  .trust-number {
    font-size: 120px;
  }

  .client-grid {
    grid-template-columns: 1fr 1fr;
    gap: var(--spacing-md);
  }

  .footer {
    padding: var(--spacing-xl) var(--spacing-2xl);
  }
}

  @media (min-width: 768px) {
    .page-title-area { padding: calc(96px + 60px) var(--spacing-2xl) var(--spacing-3xl); }
    .content-area { padding: var(--spacing-3xl) var(--spacing-2xl); }
  }

  @media (min-width: 1024px) {
    .page-title-area { padding: calc(96px + 80px) var(--spacing-3xl) var(--spacing-3xl); }
    .content-area { padding: var(--spacing-3xl); }
  }
</style>
</head>
<body>

{{chrome_header}}

<!-- Page Title -->
<section class="page-title-area">
  <div class="page-title-inner">
    <h1>{{title}}</h1>
  </div>
</section>

<!-- Page Content -->
<div class="content-area">
  {{content}}
</div>

{{chrome_footer}}

</main>

<script>
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const sidebar = document.getElementById('sidebar');
  const navOverlay = document.getElementById('navOverlay');

  hamburgerBtn.addEventListener('click', function() {
    sidebar.classList.toggle('active');
    navOverlay.classList.toggle('active');
  });

  navOverlay.addEventListener('click', function() {
    sidebar.classList.remove('active');
    navOverlay.classList.remove('active');
  });

  // Close sidebar on resize to desktop
  window.addEventListener('resize', function() {
    if (window.innerWidth >= 1024) {
      sidebar.classList.remove('active');
      navOverlay.classList.remove('active');
    }
  });
</script>

</body>
</html>
