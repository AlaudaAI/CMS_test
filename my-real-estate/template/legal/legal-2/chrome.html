<!-- HEADER -->
<nav class="nav">
  <a href="/" class="nav-logo">{{title}}</a>
  <div class="nav-links">{{nav}}</div>
  <button class="nav-hamburger" aria-label="Open menu" onclick="openMobileMenu()">
    <span></span>
    <span></span>
    <span></span>
  </button>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-menu-close" aria-label="Close menu" onclick="closeMobileMenu()">✕</button>
  {{nav}}
</div>

<main class="content">{{content}}</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <a href="/" class="nav-logo">{{title}}</a>
      <p class="footer-description">Providing strategic legal counsel and dedicated representation to protect what matters most.</p>
    </div>
    <div class="footer-links">
      {{nav}}
    </div>
    <div class="footer-bottom">
      <p>&copy; 2024 {{title}}. All rights reserved.</p>
    </div>
  </div>
</footer>
