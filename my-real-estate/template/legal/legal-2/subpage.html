<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  {{tokens}}

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    font-family: var(--font);
    background-color: var(--bg);
    color: var(--fg);
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    overflow-wrap: break-word;
  }

  /* Navigation */
  .nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: var(--spacing-lg) var(--spacing-lg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--fg);
  }

  .nav-logo {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--nav-text);
    letter-spacing: -0.02em;
    text-decoration: none;
    white-space: nowrap;
  }

  .nav-links {
    display: none;
    list-style: none;
    gap: var(--spacing-xl);
    align-items: center;
  }

  .nav-links a {
    color: var(--nav-text);
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 500;
    position: relative;
    padding-bottom: 2px;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 1.5px;
    background: var(--nav-text);
    transition: width var(--transition);
  }

  .nav-links a:hover::after {
    width: 100%;
  }

  .nav-hamburger {
    display: flex;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: var(--spacing-sm);
  }

  .nav-hamburger span {
    width: 24px;
    height: 2px;
    background: var(--nav-text);
    transition: var(--transition);
    display: block;
  }

  /* Mobile Menu */
  .mobile-menu {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--fg);
    z-index: 99;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: var(--spacing-xl);
  }

  .mobile-menu.active {
    display: flex;
  }

  .mobile-menu a {
    color: var(--nav-text);
    text-decoration: none;
    font-size: 1.5rem;
    font-weight: 600;
    transition: opacity var(--transition);
  }

  .mobile-menu a:hover {
    opacity: 0.7;
  }

  .mobile-menu-close {
    position: absolute;
    top: var(--spacing-lg);
    right: var(--spacing-lg);
    background: none;
    border: none;
    color: var(--nav-text);
    font-size: 1.5rem;
    cursor: pointer;
    padding: var(--spacing-sm);
  }

  /* Page Title Area */
  .page-title-area {
    padding: calc(var(--spacing-4xl) + 60px) var(--spacing-lg) var(--spacing-3xl);
    background: var(--fg);
    color: var(--nav-text);
  }

  .page-title-inner {
    max-width: var(--max-w);
    margin: 0 auto;
  }

  .page-title-area h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.03em;
  }

  /* Content Area */
  .content-area {
    padding: var(--spacing-3xl) var(--spacing-lg);
    max-width: var(--max-w);
    margin: 0 auto;
  }

  .content-area h2 {
    font-size: clamp(1.5rem, 3vw, 2rem);
    font-weight: 600;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--fg);
    margin-bottom: var(--spacing-lg);
  }

  .content-area h3 {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--fg);
    margin-bottom: var(--spacing-md);
  }

  .content-area p {
    font-size: 1rem;
    line-height: 1.7;
    color: var(--muted);
    margin-bottom: var(--spacing-lg);
  }

  .content-area ul, .content-area ol {
    margin-bottom: var(--spacing-lg);
    padding-left: var(--spacing-lg);
    color: var(--muted);
  }

  .content-area li {
    margin-bottom: var(--spacing-sm);
    line-height: 1.7;
  }

  .content-area img {
    max-width: 100%;
    height: auto;
    border-radius: 12px;
    margin-bottom: var(--spacing-lg);
  }

  .content-area a {
    color: var(--fg);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-thickness: 1px;
    font-weight: 500;
  }

  .content-area a:hover {
    text-decoration-thickness: 2px;
  }

  /* Cards (reusable) */
  .card {
    background: var(--card-bg);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-card);
    transition: box-shadow var(--transition);
  }

  .card:hover {
    box-shadow: var(--shadow-card-hover);
  }

  .card-body {
    padding: var(--spacing-lg);
  }

  /* Footer */
  .footer {
    background: var(--fg);
    color: var(--nav-text);
    padding: var(--spacing-3xl) var(--spacing-lg);
  }

  .footer-inner {
    max-width: var(--max-w);
    margin: 0 auto;
  }

  .footer-brand {
    margin-bottom: var(--spacing-2xl);
  }

  .footer-description {
    font-size: 0.875rem;
    color: var(--text-muted);
    max-width: 400px;
    margin-top: var(--spacing-md);
    line-height: 1.6;
  }

  .footer-links {
    display: flex;
    flex-wrap: wrap;
    gap: var(--spacing-lg);
    margin-bottom: var(--spacing-2xl);
  }

  .footer-links a {
    color: var(--nav-text);
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 500;
    opacity: 0.7;
    transition: opacity var(--transition);
  }

  .footer-links a:hover {
    opacity: 1;
  }

  .footer-bottom {
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: var(--spacing-lg);
    font-size: 0.8125rem;
    color: var(--text-muted);
  }

  /* Responsive */
  @media (min-width: 768px) {
    .nav { padding: var(--spacing-xl) var(--spacing-2xl); }
    .nav-links { display: flex; }
    .nav-hamburger { display: none; }
    .page-title-area { padding: calc(var(--spacing-4xl) + 60px) var(--spacing-2xl) var(--spacing-3xl); }
    .content-area { padding: var(--spacing-3xl) var(--spacing-2xl); }
  }

  @media (min-width: 1024px) {
    .nav { padding: var(--spacing-xl) var(--spacing-3xl); }
    .nav-logo { font-size: 1.375rem; }
    .nav-links { gap: var(--spacing-2xl); }
    .page-title-area { padding: calc(var(--spacing-4xl) + 80px) var(--spacing-3xl) var(--spacing-3xl); }
    .content-area { padding: var(--spacing-3xl); }
  }

  @media (min-width: 1280px) {
    .nav { padding: var(--spacing-xl) var(--spacing-4xl); }
    .page-title-area { padding-left: var(--spacing-4xl); padding-right: var(--spacing-4xl); }
    .content-area { padding-left: var(--spacing-4xl); padding-right: var(--spacing-4xl); }
  }
</style>
</head>
<body>

{{chrome_header}}

<!-- Page Title -->
<section class="page-title-area">
  <div class="page-title-inner">
    <h1>{{title}}</h1>
  </div>
</section>

<!-- Page Content -->
<div class="content-area">
  {{content}}
</div>

{{chrome_footer}}

<script>
  // Mobile menu
  function openMobileMenu() {
    document.getElementById('mobileMenu').classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeMobileMenu() {
    document.getElementById('mobileMenu').classList.remove('active');
    document.body.style.overflow = '';
  }
</script>

</body>
</html>
