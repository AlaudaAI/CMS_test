<!-- HEADER -->
<header class="chrome-header">
  <div class="chrome-header__inner">
    <a href="/" class="chrome-header__logo">{{title}}</a>
    <nav class="chrome-header__nav">{{nav}}</nav>
    <button class="chrome-header__menu" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<main class="content">{{content}}</main>

<!-- FOOTER -->
<footer class="chrome-footer">
  <div class="chrome-footer__inner">
    <span class="chrome-footer__brand">{{title}}</span>
    <nav class="chrome-footer__nav">{{nav}}</nav>
    <span class="chrome-footer__copy">&copy; 2025 {{title}}. All rights reserved.</span>
  </div>
</footer>
